<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TripMH - מרכז שליטה לוגיסטי</title>
    <!-- Tailwind CSS for modern responsive utility styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        darkBg: '#090d16',
                        darkCard: '#131926',
                        darkBorder: '#1e293b'
                    }
                }
            }
        }
    </script>
    <style>
        /* Modern subtle scrollbar */
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: #475569;
            border-radius: 3px;
        }
        
        /* Sticky day header shadow & positioning */
        .sticky-day {
            position: sticky;
            top: 125px; /* Adjust based on total top nav height */
            z-index: 30;
        }

        /* Safe separation of hit areas */
        .hit-target {
            min-height: 44px;
            min-width: 44px;
        }

        /* Custom transition for accordion */
        .accordion-content {
            transition: max-height 0.25s cubic-bezier(0, 1, 0, 1);
            max-height: 0;
            overflow: hidden;
        }
        .accordion-content.expanded {
            max-height: 2000px;
            transition: max-height 0.4s ease-in-out;
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 dark:bg-[#090d16] dark:text-slate-100 transition-colors duration-200 font-sans min-h-screen pb-20 select-none">

    <!-- Top Sticky Control Center -->
    <header class="sticky top-0 z-40 bg-white/95 dark:bg-[#090d16]/95 backdrop-blur-md border-b border-slate-200 dark:border-darkBorder shadow-sm">
        <div class="max-w-md mx-auto px-4 py-3">
            
            <!-- Branding, Upload & Theme Toggle -->
            <div class="flex items-center justify-between gap-2 mb-3">
                <div class="flex items-center gap-2">
                    <span class="text-2xl">⚡</span>
                    <div>
                        <h1 class="text-lg font-bold leading-none tracking-tight">TripMH</h1>
                        <span class="text-[10px] text-slate-500 dark:text-slate-400">ניהול שטח אופליין</span>
                    </div>
                </div>
                
                <div class="flex items-center gap-2">
                    <!-- Reset Button -->
                    <button onclick="confirmReset()" title="איפוס נתונים" class="p-2 text-slate-400 hover:text-red-500 dark:hover:text-red-400 rounded-lg hit-target">
                        🔄
                    </button>
                    <!-- Theme Toggle -->
                    <button onclick="toggleTheme()" class="p-2 text-slate-500 dark:text-amber-400 bg-slate-100 dark:bg-slate-800 rounded-lg hit-target" id="themeBtn">
                        🌙
                    </button>
                    <!-- CSV Upload Hidden Input & Custom Button -->
                    <label class="p-2 bg-blue-600 hover:bg-blue-700 text-white rounded-lg cursor-pointer flex items-center justify-center font-bold hit-target text-sm">
                        ➕ טען קובץ
                        <input type="file" id="csvFileInput" accept=".csv" class="hidden" onchange="handleCSVUpload(event)">
                    </label>
                </div>
            </div>

            <!-- Search Area -->
            <div class="relative flex items-center">
                <input type="text" id="omniSearch" oninput="handleSearch(this.value)" placeholder="חפש יעד, פעילות, טיפ או אזור..." class="w-full pl-10 pr-4 py-2 text-sm bg-slate-100 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500 dark:text-white">
                <span class="absolute left-3 text-slate-400">🔍</span>
                <button onclick="clearSearch()" id="clearSearchBtn" class="hidden absolute left-8 p-1 text-slate-400 hover:text-slate-600 dark:hover:text-slate-200 hit-target">✕</button>
            </div>
        </div>

        <!-- Navigation Tabs -->
        <nav class="max-w-md mx-auto px-2 flex justify-around border-t border-slate-200 dark:border-darkBorder bg-slate-50/50 dark:bg-[#131926]/50">
            <button onclick="switchTab('itinerary')" id="tab-itinerary" class="py-3 px-2 flex flex-col items-center gap-1 border-b-2 border-transparent text-xs font-semibold text-slate-500 dark:text-slate-400 flex-1 transition-all">
                <span class="text-lg">📍</span>
                <span>מסלול</span>
            </button>
            <button onclick="switchTab('options')" id="tab-options" class="py-3 px-2 flex flex-col items-center gap-1 border-b-2 border-transparent text-xs font-semibold text-slate-500 dark:text-slate-400 flex-1 transition-all">
                <span class="text-lg">⭐</span>
                <span>אופציות</span>
            </button>
            <button onclick="switchTab('tips')" id="tab-tips" class="py-3 px-2 flex flex-col items-center gap-1 border-b-2 border-transparent text-xs font-semibold text-slate-500 dark:text-slate-400 flex-1 transition-all">
                <span class="text-lg">💡</span>
                <span>טיפים</span>
            </button>
            <button onclick="switchTab('around')" id="tab-around" class="py-3 px-2 flex flex-col items-center gap-1 border-b-2 border-transparent text-xs font-semibold text-slate-500 dark:text-slate-400 flex-1 transition-all">
                <span class="text-lg">🗺️</span>
                <span>סביבי</span>
            </button>
        </nav>
    </header>

    <!-- Main Container -->
    <main class="max-w-md mx-auto px-4 mt-4" id="mainContent">
        <!-- Render targets go here dynamically -->
    </main>

    <!-- App Scripts and Logic -->
    <script>
        // Default Sample Data to ensure instant functionality on initial load
        const SAMPLE_ITINERARY = [
            { id: "i1", day: "יום שני • 12/10", time: "09:00", place: "שוק טוקיו - טסוקיג'י", area: "Tokyo", booking: "לא", desc: "סיור טעימות שוק בוקר תוסס. מומלץ להצטייד במזומן מראש.", link: "https://www.google.com/maps/search/?api=1&query=Tsukiji+Outer+Market" },
            { id: "i2", day: "יום שני • 12/10", time: "14:00", place: "TeamLab Planets", area: "Toyosu", booking: "כן", desc: "מיצג אמנות דיגיטלי אינטראקטיבי יוצא דופן. חובה להגיע עם מכנסיים שניתן לקפל מעל הברך עקב הליכה במים.", link: "https://www.google.com/maps/search/?api=1&query=teamLab+Planets" },
            { id: "i3", day: "יום שלישי • 13/10", time: "10:00", place: "מקדש סנסו-ג'י", area: "Asakusa", booking: "לא", desc: "המקדש העתיק ביותר בטוקיו. מדרחוב קניות מסורתי מרשים מוביל לכניסה.", link: "https://www.google.com/maps/search/?api=1&query=Sensō-ji" },
            { id: "i4", day: "יום שלישי • 13/10", time: "19:00", place: "תצפית שיבויה סקיי", area: "Shibuya", booking: "כן", desc: "תצפית 360 מעלות מרהיבה על כל טוקיו ומעבר החצייה המפורסם.", link: "https://maps.google.com/?q=Shibuya+Sky/0" } // Sample of slightly broken link ending in /0
        ];

        const SAMPLE_OPTIONS = [
            { id: "o1", place: "טיול יום להר פוג'י", area: "Hakone", desc: "במקרה של ראות טובה, ניתן לנסוע באמצעות רכבת השינקנסן ישירות לאזור האגמים.", link: "" },
            { id: "o2", place: "מוזיאון הרכבות הלאומי", area: "Omiya", desc: "אלטרנטיבה מצוינת ליום גשום עם הדמיות נסיעה וקרונות היסטוריים.", link: "https://www.google.com/maps/search/?api=1&query=The+Railway+Museum" }
        ];

        const SAMPLE_TIPS = [
            { id: "t1", category: "כשרות ושבת", title: "מפתח פתרונות הלכתיים בחו\"ל", desc: "לפני השבת יש לוודא כי מפתחות החדר אינם אלקטרוניים, או לבקש מהקבלה פתרון שאינו כרוך בהפעלה חשמלית. מומלץ להחזיק צילום מודפס של הדרכון בכיס.", link: "" },
            { id: "t2", category: "תחבורה והגעה", title: "טעינת כרטיס Suica / Pasmo באייפון", desc: "ניתן להוסיף כרטיס דיגיטלי ישירות לארנק ה-Apple Wallet ללא צורך בכרטיס פיזי, ולטעון אותו ישירות באמצעות כרטיס אשראי תומך.", link: "https://www.apple.com/apple-pay/" }
        ];

        // Core Application State
        let state = {
            theme: 'dark',
            activeTab: 'itinerary',
            searchFilter: '',
            userLocation: null,
            data: {
                itinerary: [],
                options: [],
                tips: []
            },
            checkedItems: {}, // stores checked status indexed by item ID
            expandedCards: {} // tracks accordion states
        };

        // Initialize Application
        function init() {
            // Load theme configuration
            if (localStorage.getItem('theme')) {
                state.theme = localStorage.getItem('theme');
            } else {
                state.theme = 'dark'; // Default configuration for high-stress contrast / OLED energy saving
            }
            applyTheme();

            // Load persisted state data
            try {
                const storedData = localStorage.getItem('tripmh_data');
                const storedChecked = localStorage.getItem('tripmh_checked');
                
                if (storedData) {
                    state.data = JSON.parse(storedData);
                } else {
                    // Load fallback presets
                    state.data.itinerary = SAMPLE_ITINERARY;
                    state.data.options = SAMPLE_OPTIONS;
                    state.data.tips = SAMPLE_TIPS;
                    saveDataToStorage();
                }

                if (storedChecked) {
                    state.checkedItems = JSON.parse(storedChecked);
                }
            } catch (e) {
                console.error("שגיאה בטעינת זיכרון מקומי. שחזור ברירות מחדל מתבצע.", e);
                clearAppStorage();
            }

            // Set default active tab
            switchTab(state.activeTab);
        }

        // Persist App Data
        function saveDataToStorage() {
            try {
                localStorage.setItem('tripmh_data', JSON.stringify(state.data));
            } catch (e) {
                console.error("שגיאה בשמירת נתוני האפליקציה", e);
            }
        }

        function saveCheckedToStorage() {
            try {
                localStorage.setItem('tripmh_checked', JSON.stringify(state.checkedItems));
            } catch (e) {
                console.error("שגיאה בשמירת מצב סימון", e);
            }
        }

        // Theme management
        function toggleTheme() {
            state.theme = state.theme === 'dark' ? 'light' : 'dark';
            localStorage.setItem('theme', state.theme);
            applyTheme();
        }

        function applyTheme() {
            const html = document.documentElement;
            const themeBtn = document.getElementById('themeBtn');
            if (state.theme === 'dark') {
                html.classList.add('dark');
                themeBtn.innerHTML = '☀️';
            } else {
                html.classList.remove('dark');
                themeBtn.innerHTML = '🌙';
            }
        }

        // Clean-Up & Repair broken map links (Self-Healing Engine)
        function sanitizeMapLink(placeName, rawLink) {
            if (!rawLink || typeof rawLink !== 'string') {
                return `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(placeName)}`;
            }
            let clean = rawLink.trim();
            // Check for obvious placeholders, dummy local addresses or trailing garbage like /0
            if (clean.endsWith('/0')) {
                clean = clean.substring(0, clean.length - 2);
            }
            if (clean.toLowerCase() === 'javascript:void(0)' || clean === '#' || clean.length < 8) {
                return `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(placeName)}`;
            }
            return clean;
        }

        // Parsing links inside textual tips to extract wide call-to-action download buttons
        function formatTextWithLinks(text) {
            if (!text) return '';
            const urlPattern = /(\b(https?|ftp|file):\/\/[-A-Z0-9+&@#\/%?=~_|!:,.;]*[-A-Z0-9+&@#\/%=~_|])/ig;
            
            // Check if there is an exact URL matching to present outside the description
            const matches = text.match(urlPattern);
            let cleanedText = text;
            let actionButtonsHTML = '';

            if (matches) {
                matches.forEach(url => {
                    cleanedText = cleanedText.replace(url, `<a href="${url}" target="_blank" class="text-blue-500 dark:text-blue-400 underline break-all">${url}</a>`);
                    
                    let buttonLabel = "🔗 פתח קישור";
                    if (url.includes('apple.com') || url.includes('play.google') || url.includes('app')) {
                        buttonLabel = "📥 פתח קישור הורדה";
                    }
                    actionButtonsHTML += `
                        <a href="${url}" target="_blank" onclick="event.stopPropagation();" class="mt-2 block w-full text-center bg-slate-100 hover:bg-slate-200 dark:bg-slate-800 dark:hover:bg-slate-700 text-blue-600 dark:text-blue-400 font-bold py-2 px-4 rounded-lg text-sm border border-slate-200 dark:border-slate-700 transition-all hit-target">
                            ${buttonLabel}
                        </a>
                    `;
                });
            }
            return { text: cleanedText, buttons: actionButtonsHTML };
        }

        // Dynamic search management
        function handleSearch(val) {
            state.searchFilter = val.toLowerCase().trim();
            const clearBtn = document.getElementById('clearSearchBtn');
            if (val.length > 0) {
                clearBtn.classList.remove('hidden');
            } else {
                clearBtn.classList.add('hidden');
            }
            renderActiveTab();
        }

        function clearSearch() {
            const searchInput = document.getElementById('omniSearch');
            searchInput.value = '';
            state.searchFilter = '';
            document.getElementById('clearSearchBtn').classList.add('hidden');
            renderActiveTab();
        }

        // Tab routing switcher
        function switchTab(tabId) {
            state.activeTab = tabId;
            
            // UI Visual update on navigation elements
            const tabs = ['itinerary', 'options', 'tips', 'around'];
            tabs.forEach(t => {
                const el = document.getElementById(`tab-${t}`);
                if (t === tabId) {
                    el.classList.add('border-blue-500', 'text-blue-600', 'dark:text-blue-400');
                    el.classList.remove('border-transparent', 'text-slate-500', 'dark:text-slate-400');
                } else {
                    el.classList.remove('border-blue-500', 'text-blue-600', 'dark:text-blue-400');
                    el.classList.add('border-transparent', 'text-slate-500', 'dark:text-slate-400');
                }
            });

            renderActiveTab();
        }

        // Toggle card collapse / expand state
        function toggleCardExpand(cardId) {
            state.expandedCards[cardId] = !state.expandedCards[cardId];
            const content = document.getElementById(`desc-${cardId}`);
            const chevron = document.getElementById(`chevron-${cardId}`);
            
            if (content) {
                if (state.expandedCards[cardId]) {
                    content.classList.add('expanded');
                    if (chevron) chevron.innerText = '▲';
                } else {
                    content.classList.remove('expanded');
                    if (chevron) chevron.innerText = '▼';
                }
            }
        }

        // Handle item check / uncheck state
        function toggleCheckItem(id, event) {
            event.stopPropagation(); // Avoid triggering accordion toggle on checkbox hit
            state.checkedItems[id] = !state.checkedItems[id];
            saveCheckedToStorage();
            
            const card = document.getElementById(`card-${id}`);
            const checkIcon = document.getElementById(`check-icon-${id}`);
            
            if (state.checkedItems[id]) {
                card.classList.add('opacity-50', 'border-emerald-500', 'dark:border-emerald-800');
                if (checkIcon) checkIcon.innerHTML = '🟢';
            } else {
                card.classList.remove('opacity-50', 'border-emerald-500', 'dark:border-emerald-800');
                if (checkIcon) checkIcon.innerHTML = '⚪';
            }
        }

        // Robust CSV Parser (handles embedded commas and quotes properly)
        function robustCSVParse(text) {
            let lines = [];
            let row = [""];
            let inQuotes = false;
            for (let i = 0; i < text.length; i++) {
                let c = text[i];
                let next = text[i+1];
                if (c === '"') {
                    if (inQuotes && next === '"') {
                        row[row.length - 1] += '"';
                        i++;
                    } else {
                        inQuotes = !inQuotes;
                    }
                } else if (c === ',' && !inQuotes) {
                    row.push('');
                } else if ((c === '\r' || c === '\n') && !inQuotes) {
                    if (c === '\r' && next === '\n') { i++; }
                    lines.push(row);
                    row = [''];
                } else {
                    row[row.length - 1] += c;
                }
            }
            if (row.length > 1 || row[0] !== '') {
                lines.push(row);
            }
            return lines;
        }

        // Semantic analysis mapping of CSV headers & properties
        function processAndLoadCSV(text) {
            const parsedLines = robustCSVParse(text);
            if (parsedLines.length < 2) return;

            // Extract, clean and normalize headers
            const headers = parsedLines[0].map(h => h.trim().toLowerCase());
            
            let itineraryList = [];
            let optionsList = [];
            let tipsList = [];

            for (let i = 1; i < parsedLines.length; i++) {
                const row = parsedLines[i];
                if (row.length === 0 || (row.length === 1 && row[0] === "")) continue;

                // Create a helper mapping of columns to keys
                let entry = {};
                headers.forEach((header, idx) => {
                    entry[header] = row[idx] ? row[idx].trim() : '';
                });

                // Generate Unique ID
                const entryId = 'csv_' + i + '_' + Date.now().toString().slice(-4);

                // Semantic Heuristics Detection
                const isTip = headers.some(h => h.includes('הנחיה') || h.includes('קטגוריה') || h.includes('טיפ'));
                const dayValue = entry['יום'] || entry['day'] || '';
                const isOption = dayValue.includes('אופציה') || !dayValue;

                if (isTip) {
                    tipsList.push({
                        id: entryId,
                        category: entry['קטגוריה'] || entry['נושא'] || 'כללי',
                        title: entry['כותרת'] || entry['הנחיה'] || entry['ריכוז הנחיות'] || 'ללא כותרת',
                        desc: entry['תוכן'] || entry['פירוט'] || entry['תיאור'] || '',
                        link: entry['קישור'] || entry['לינק'] || ''
                    });
                } else if (isOption) {
                    optionsList.push({
                        id: entryId,
                        place: entry['יעד'] || entry['שם המקום'] || entry['פעילות'] || 'פעילות ללא שם',
                        area: entry['אזור'] || entry['מיקום'] || '',
                        desc: entry['הערות'] || entry['תיאור'] || '',
                        link: entry['קישור'] || entry['קישור לניווט'] || entry['לינק'] || ''
                    });
                } else {
                    itineraryList.push({
                        id: entryId,
                        day: dayValue,
                        time: entry['שעה'] || entry['זמן'] || '--:--',
                        place: entry['יעד'] || entry['שם המקום'] || entry['פעילות'] || 'פעילות ללא שם',
                        area: entry['אזור'] || entry['מיקום'] || '',
                        booking: entry['שריון'] || entry['דורש שריון'] || 'לא',
                        desc: entry['הערות'] || entry['תיאור'] || '',
                        link: entry['קישור'] || entry['קישור לניווט'] || entry['לינק'] || ''
                    });
                }
            }

            // Fallback safety checks
            if (itineraryList.length > 0) state.data.itinerary = itineraryList;
            if (optionsList.length > 0) state.data.options = optionsList;
            if (tipsList.length > 0) state.data.tips = tipsList;

            saveDataToStorage();
            switchTab(state.activeTab);
            alert("קובץ הנתונים נקרא ומוין בהצלחה ללשוניות!");
        }

        // File Selection Listener
        function handleCSVUpload(event) {
            const file = event.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    processAndLoadCSV(e.target.result);
                } catch (error) {
                    alert("אירעה שגיאה בעיבוד קובץ ה-CSV. אנא וודא שהקובץ תקין.");
                }
            };
            reader.readAsText(file, "UTF-8");
        }

        // Master Render Router
        function renderActiveTab() {
            const container = document.getElementById('mainContent');
            container.innerHTML = '';

            switch (state.activeTab) {
                case 'itinerary':
                    renderItinerary(container);
                    break;
                case 'options':
                    renderOptions(container);
                    break;
                case 'tips':
                    renderTips(container);
                    break;
                case 'around':
                    renderAroundMe(container);
                    break;
            }
        }

        // 📍 Render Tab: Itinerary
        function renderItinerary(container) {
            const search = state.searchFilter;
            let filtered = state.data.itinerary.filter(item => {
                return !search || 
                    item.place.toLowerCase().includes(search) || 
                    item.area.toLowerCase().includes(search) || 
                    item.desc.toLowerCase().includes(search) ||
                    item.day.toLowerCase().includes(search);
            });

            if (filtered.length === 0) {
                container.innerHTML = `<div class="text-center py-10 text-slate-400">לא נמצאו יעדים התואמים את החיפוש.</div>`;
                return;
            }

            // Grouping by Sticky Days
            let daysMap = {};
            filtered.forEach(item => {
                if (!daysMap[item.day]) daysMap[item.day] = [];
                daysMap[item.day].push(item);
            });

            Object.keys(daysMap).forEach(dayName => {
                // Day Divider
                const dayHeader = document.createElement('div');
                dayHeader.className = "sticky-day bg-slate-50/90 dark:bg-darkBg/90 backdrop-blur-sm py-2 px-1 text-sm font-bold text-blue-600 dark:text-blue-400 border-b border-slate-200 dark:border-darkBorder mb-3";
                dayHeader.innerHTML = `🗓️ ${dayName}`;
                container.appendChild(dayHeader);

                // Daily Activity Grouping
                daysMap[dayName].forEach(item => {
                    const isChecked = state.checkedItems[item.id] || false;
                    const cleanLink = sanitizeMapLink(item.place, item.link);
                    const isBookingRequired = item.booking && (item.booking.includes('כן') || item.booking.toLowerCase() === 'yes' || item.booking.includes('שריון'));
                    
                    const card = document.createElement('div');
                    card.id = `card-${item.id}`;
                    card.className = `mb-3 p-3 bg-white dark:bg-darkCard rounded-xl border ${isChecked ? 'opacity-50 border-emerald-500 dark:border-emerald-800' : 'border-slate-200 dark:border-slate-800'} shadow-sm transition-all cursor-pointer`;
                    card.onclick = () => toggleCardExpand(item.id);

                    card.innerHTML = `
                        <div class="flex items-start justify-between gap-3">
                            <!-- Checkbox Target Area -->
                            <button onclick="toggleCheckItem('${item.id}', event)" class="hit-target flex items-center justify-center text-xl mt-0.5">
                                <span id="check-icon-${item.id}">${isChecked ? '🟢' : '⚪'}</span>
                            </button>

                            <!-- Core Event Info -->
                            <div class="flex-1">
                                <div class="flex items-center gap-2 flex-wrap mb-1">
                                    <span class="text-xs font-bold px-2 py-0.5 bg-slate-100 dark:bg-slate-800 rounded-md text-slate-600 dark:text-slate-300">${item.time}</span>
                                    ${item.area ? `<span class="text-xs text-slate-400">📍 ${item.area}</span>` : ''}
                                    ${isBookingRequired ? `<span class="text-[10px] bg-red-100 dark:bg-red-950 text-red-600 dark:text-red-400 font-bold px-1.5 py-0.5 rounded-md">🚨 דורש שריון</span>` : ''}
                                </div>
                                <h3 class="text-base font-bold">${item.place}</h3>
                            </div>

                            <!-- Expand Toggle Indicator -->
                            <span id="chevron-${item.id}" class="text-xs text-slate-400 mt-1.5">${state.expandedCards[item.id] ? '▲' : '▼'}</span>
                        </div>

                        <!-- Accordion collapsible details drawer -->
                        <div id="desc-${item.id}" class="accordion-content mt-2 pt-2 border-t border-slate-100 dark:border-slate-800 text-sm ${state.expandedCards[item.id] ? 'expanded' : ''}">
                            <p class="text-slate-600 dark:text-slate-300 leading-relaxed mb-3">${item.desc || 'אין תיאור מורחב עבור יעד זה.'}</p>
                            <a href="${cleanLink}" target="_blank" onclick="event.stopPropagation();" class="w-full flex items-center justify-center gap-2 bg-blue-600 hover:bg-blue-700 text-white font-bold py-2.5 px-4 rounded-lg text-sm hit-target">
                                🗺️ נווט באפליקציית מפות
                            </a>
                        </div>
                    `;
                    container.appendChild(card);
                });
            });
        }

        // ⭐ Render Tab: Options
        function renderOptions(container) {
            const search = state.searchFilter;
            let filtered = state.data.options.filter(item => {
                return !search || 
                    item.place.toLowerCase().includes(search) || 
                    item.area.toLowerCase().includes(search) || 
                    item.desc.toLowerCase().includes(search);
            });

            if (filtered.length === 0) {
                container.innerHTML = `<div class="text-center py-10 text-slate-400">אין פריטי אופציה התואמים את החיפוש.</div>`;
                return;
            }

            filtered.forEach(item => {
                const isChecked = state.checkedItems[item.id] || false;
                const cleanLink = sanitizeMapLink(item.place, item.link);

                const card = document.createElement('div');
                card.id = `card-${item.id}`;
                card.className = `mb-3 p-3 bg-white dark:bg-darkCard rounded-xl border ${isChecked ? 'opacity-50 border-emerald-500 dark:border-emerald-800' : 'border-slate-200 dark:border-slate-800'} shadow-sm transition-all cursor-pointer`;
                card.onclick = () => toggleCardExpand(item.id);

                card.innerHTML = `
                    <div class="flex items-start justify-between gap-3">
                        <button onclick="toggleCheckItem('${item.id}', event)" class="hit-target flex items-center justify-center text-xl mt-0.5">
                            <span id="check-icon-${item.id}">${isChecked ? '🟢' : '⚪'}</span>
                        </button>

                        <div class="flex-1">
                            <div class="flex items-center gap-2 mb-1">
                                <span class="text-xs text-amber-500 font-bold">⭐ אפשרות חלופית</span>
                                ${item.area ? `<span class="text-xs text-slate-400">📍 ${item.area}</span>` : ''}
                            </div>
                            <h3 class="text-base font-bold">${item.place}</h3>
                        </div>

                        <span id="chevron-${item.id}" class="text-xs text-slate-400 mt-1.5">${state.expandedCards[item.id] ? '▲' : '▼'}</span>
                    </div>

                    <div id="desc-${item.id}" class="accordion-content mt-2 pt-2 border-t border-slate-100 dark:border-slate-800 text-sm ${state.expandedCards[item.id] ? 'expanded' : ''}">
                        <p class="text-slate-600 dark:text-slate-300 leading-relaxed mb-3">${item.desc || 'אין תיאור זמין.'}</p>
                        <a href="${cleanLink}" target="_blank" onclick="event.stopPropagation();" class="w-full flex items-center justify-center gap-2 bg-blue-600 hover:bg-blue-700 text-white font-bold py-2.5 px-4 rounded-lg text-sm hit-target">
                            🗺️ נווט באפליקציית מפות
                        </a>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        // 💡 Render Tab: Tips & Checklists
        function renderTips(container) {
            const search = state.searchFilter;
            let filtered = state.data.tips.filter(item => {
                return !search || 
                    item.category.toLowerCase().includes(search) || 
                    item.title.toLowerCase().includes(search) || 
                    item.desc.toLowerCase().includes(search);
            });

            if (filtered.length === 0) {
                container.innerHTML = `<div class="text-center py-10 text-slate-400">אין טיפים התואמים את החיפוש.</div>`;
                return;
            }

            // Group by category
            let categoryMap = {};
            filtered.forEach(item => {
                if (!categoryMap[item.category]) categoryMap[item.category] = [];
                categoryMap[item.category].push(item);
            });

            Object.keys(categoryMap).forEach(cat => {
                const header = document.createElement('div');
                header.className = "py-2 px-1 text-sm font-bold text-indigo-500 dark:text-indigo-400 border-b border-slate-200 dark:border-darkBorder mb-3";
                header.innerText = `💡 ${cat}`;
                container.appendChild(header);

                categoryMap[cat].forEach(item => {
                    const isChecked = state.checkedItems[item.id] || false;
                    const parsedData = formatTextWithLinks(item.desc);

                    const card = document.createElement('div');
                    card.id = `card-${item.id}`;
                    card.className = `mb-3 p-3 bg-white dark:bg-darkCard rounded-xl border ${isChecked ? 'opacity-50 border-emerald-500 dark:border-emerald-800' : 'border-slate-200 dark:border-slate-800'} shadow-sm transition-all cursor-pointer`;
                    card.onclick = () => toggleCardExpand(item.id);

                    card.innerHTML = `
                        <div class="flex items-start justify-between gap-3">
                            <button onclick="toggleCheckItem('${item.id}', event)" class="hit-target flex items-center justify-center text-xl mt-0.5">
                                <span id="check-icon-${item.id}">${isChecked ? '🟢' : '⚪'}</span>
                            </button>

                            <div class="flex-1">
                                <h3 class="text-sm font-bold mt-1.5 leading-snug">${item.title}</h3>
                            </div>

                            <span id="chevron-${item.id}" class="text-xs text-slate-400 mt-2">${state.expandedCards[item.id] ? '▲' : '▼'}</span>
                        </div>

                        <div id="desc-${item.id}" class="accordion-content mt-2 pt-2 border-t border-slate-100 dark:border-slate-800 text-sm ${state.expandedCards[item.id] ? 'expanded' : ''}">
                            <div class="text-slate-600 dark:text-slate-300 leading-relaxed text-xs space-y-2">
                                <p>${parsedData.text}</p>
                                ${parsedData.buttons}
                            </div>
                        </div>
                    `;
                    container.appendChild(card);
                });
            });
        }

        // 🗺️ Render Tab: Location GPS Dashboard (Around Me)
        function renderAroundMe(container) {
            container.innerHTML = `
                <div class="bg-white dark:bg-darkCard rounded-2xl p-5 border border-slate-200 dark:border-darkBorder shadow-sm text-center mb-4">
                    <span class="text-4xl block mb-2">📡</span>
                    <h2 class="text-lg font-bold mb-1">רשת ניווט סריקה מהירה סביבי</h2>
                    <p class="text-xs text-slate-500 dark:text-slate-400 mb-4 leading-relaxed">איכון מהיר ללא הקלדה במצבי לחץ או חיפוש פתרון מיידי בשטח.</p>
                    
                    <button onclick="triggerGPS()" id="gpsBtn" class="w-full flex items-center justify-center gap-2 bg-emerald-600 hover:bg-emerald-700 text-white font-bold py-3 px-4 rounded-xl text-sm transition-all hit-target shadow-md">
                        🗺️ הפעל איכון לווייני GPS
                    </button>
                    
                    <div id="gpsCoords" class="mt-2 text-xs text-slate-400 hidden"></div>
                </div>

                <!-- Geo Grid: Dynamic Buttons -->
                <div class="grid grid-cols-2 gap-3" id="geoGrid">
                    <!-- Placeholder covers until GPS gets locked or fallback defaults applied -->
                    <button onclick="openMapQuery('מסעדות כשרות')" class="geo-btn opacity-60 flex flex-col items-center justify-center p-4 bg-slate-100 dark:bg-slate-800 rounded-xl border border-slate-200 dark:border-slate-700 text-center hit-target transition-all">
                        <span class="text-2xl mb-1">🍜</span>
                        <span class="text-xs font-bold">מסעדות בסביבה</span>
                    </button>
                    
                    <button onclick="openMapQuery('תחנת רכבת')" class="geo-btn opacity-60 flex flex-col items-center justify-center p-4 bg-slate-100 dark:bg-slate-800 rounded-xl border border-slate-200 dark:border-slate-700 text-center hit-target transition-all">
                        <span class="text-2xl mb-1">🚆</span>
                        <span class="text-xs font-bold">תחנת רכבת</span>
                    </button>

                    <button onclick="openMapQuery('conbini')" class="geo-btn opacity-60 flex flex-col items-center justify-center p-4 bg-slate-100 dark:bg-slate-800 rounded-xl border border-slate-200 dark:border-slate-700 text-center hit-target transition-all">
                        <span class="text-2xl mb-1">🏪</span>
                        <span class="text-xs font-bold">חנות נוחות</span>
                    </button>

                    <button onclick="openMapQuery('שירותים ציבוריים')" class="geo-btn opacity-60 flex flex-col items-center justify-center p-4 bg-slate-100 dark:bg-slate-800 rounded-xl border border-slate-200 dark:border-slate-700 text-center hit-target transition-all">
                        <span class="text-2xl mb-1">🚻</span>
                        <span class="text-xs font-bold">שירותים ציבוריים</span>
                    </button>
                </div>
            `;
        }

        // Trigger Geolocation API
        function triggerGPS() {
            const gpsBtn = document.getElementById('gpsBtn');
            const gpsCoords = document.getElementById('gpsCoords');
            
            gpsBtn.innerHTML = '🔄 מאכן מיקום מדויק...';
            gpsBtn.classList.add('animate-pulse');

            if (!navigator.geolocation) {
                alert("המכשיר אינו תומך באיכון GPS.");
                resetGPSBtn();
                return;
            }

            navigator.geolocation.getCurrentPosition(
                (position) => {
                    state.userLocation = {
                        lat: position.coords.latitude,
                        lon: position.coords.longitude
                    };
                    
                    gpsCoords.classList.remove('hidden');
                    gpsCoords.innerText = `קואורדינטות: ${state.userLocation.lat.toFixed(5)}, ${state.userLocation.lon.toFixed(5)}`;
                    
                    // Enable full layout visibility
                    const geoButtons = document.querySelectorAll('.geo-btn');
                    geoButtons.forEach(btn => {
                        btn.classList.remove('opacity-60');
                        btn.classList.add('border-emerald-500/40', 'bg-emerald-50/10');
                    });
                    
                    gpsBtn.innerHTML = '🟢 מיקום מאוכן ומסונכרן';
                    gpsBtn.classList.remove('animate-pulse');
                    gpsBtn.classList.remove('bg-emerald-600');
                    gpsBtn.classList.add('bg-slate-700');
                },
                (error) => {
                    console.warn("איכון GPS נכשל, מבצע חיפוש כללי על בסיס מפה נוכחית.", error);
                    alert("לא ניתן היה לאכן מיקום מדויק. האפליקציה תבצע חיפוש כללי סביב המיקום המוגדר במפה.");
                    
                    // Allow use with default general query parameters
                    const geoButtons = document.querySelectorAll('.geo-btn');
                    geoButtons.forEach(btn => {
                        btn.classList.remove('opacity-60');
                    });
                    resetGPSBtn();
                },
                { enableHighAccuracy: true, timeout: 8000, maximumAge: 10000 }
            );
        }

        function resetGPSBtn() {
            const gpsBtn = document.getElementById('gpsBtn');
            if (gpsBtn) {
                gpsBtn.innerHTML = '🗺️ הפעל איכון לווייני GPS';
                gpsBtn.classList.remove('animate-pulse');
            }
        }

        // Generate Live Map Intent query
        function openMapQuery(keyword) {
            let url = '';
            if (state.userLocation) {
                url = `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(keyword)}&query_place_id=${state.userLocation.lat},${state.userLocation.lon}`;
            } else {
                url = `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(keyword)}`;
            }
            window.open(url, '_blank');
        }

        // Clean slate management
        function confirmReset() {
            if (confirm("האם אתה בטוח שברצונך לאפס את האפליקציה ולמחוק את כל השינויים וקבצי ה-CSV שהועלו?")) {
                clearAppStorage();
            }
        }

        function clearAppStorage() {
            localStorage.removeItem('tripmh_data');
            localStorage.removeItem('tripmh_checked');
            state.checkedItems = {};
            state.expandedCards = {};
            state.data.itinerary = SAMPLE_ITINERARY;
            state.data.options = SAMPLE_OPTIONS;
            state.data.tips = SAMPLE_TIPS;
            saveDataToStorage();
            switchTab('itinerary');
            alert("הנתונים אופסו בהצלחה לגרסת ברירת המחדל.");
        }

        // Execute initial loading sequence
        window.onload = init;
    </script>
</body>
</html>

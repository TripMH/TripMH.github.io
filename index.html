<!DOCTYPE html>
<html lang="he" dir="rtl" class="dark">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="theme-color" content="#0c0f14" id="theme-meta" />
<title>TripMH – מתכנן טיול חכם</title>
<meta name="description" content="אפליקציית ניהול מסלול טיול — CSV, JSON, KML, ייצוא מלא" />
<style>
/* =========================================================
   RESET & BASE
========================================================= */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0c0f14;--bg-elevated:#131820;--bg-card:#161c25;--bg-muted:#1c2230;
  --border:rgba(255,255,255,.08);--text:#e8ecf2;--text-muted:#6b7a94;--text-dim:#3d4a60;
  --accent:#22d3ee;--accent-glow:rgba(34,211,238,.12);--accent-border:rgba(34,211,238,.28);
  --success:#4ade80;--success-glow:rgba(74,222,128,.12);
  --warning:#fbbf24;--warning-glow:rgba(251,191,36,.11);
  --danger:#f87171;--danger-glow:rgba(248,113,113,.11);
  --purple:#c084fc;--purple-glow:rgba(192,132,252,.11);
  --r-sm:8px;--r:12px;--r-lg:16px;--r-xl:20px;
}
html.light{
  --bg:#f2f4f8;--bg-elevated:#e8ecf1;--bg-card:#ffffff;--bg-muted:#edf0f5;
  --border:rgba(0,0,0,.08);--text:#111827;--text-muted:#6b7280;--text-dim:#9ca3af;
  --accent:#0891b2;--accent-glow:rgba(8,145,178,.09);--accent-border:rgba(8,145,178,.25);
  --success:#16a34a;--success-glow:rgba(22,163,74,.09);
  --warning:#d97706;--warning-glow:rgba(217,119,6,.09);
  --danger:#dc2626;--danger-glow:rgba(220,38,38,.09);
  --purple:#7c3aed;--purple-glow:rgba(124,58,237,.09);
}
html{font-family:'Segoe UI','Heebo',Arial,sans-serif;font-size:16px;line-height:1.5;
  background:var(--bg);color:var(--text);-webkit-font-smoothing:antialiased;}
body{min-height:100dvh;overflow-x:hidden;direction:rtl;background:var(--bg);}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:rgba(255,255,255,.12);border-radius:4px}
html.light ::-webkit-scrollbar-thumb{background:rgba(0,0,0,.12)}
mark{background:rgba(251,191,36,.35);color:inherit;border-radius:2px;padding:0 2px}
html.light mark{background:rgba(217,119,6,.22)}

/* =========================================================
   LAYOUT
========================================================= */
#app{max-width:480px;margin:0 auto;min-height:100dvh;display:flex;flex-direction:column;background:var(--bg);position:relative}

/* =========================================================
   HEADER
========================================================= */
#app-header{position:sticky;top:0;z-index:20;
  background:color-mix(in srgb,var(--bg) 92%,transparent);
  backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);
  border-bottom:1px solid var(--border)}
.header-top{display:flex;align-items:center;justify-content:space-between;padding:12px 14px 8px}
.logo{display:flex;align-items:center;gap:8px}
.logo-icon{width:34px;height:34px;border-radius:var(--r-sm);background:var(--accent-glow);
  display:flex;align-items:center;justify-content:center;border:1px solid var(--accent-border);flex-shrink:0}
.logo-icon svg{width:18px;height:18px;color:var(--accent)}
.logo-title{font-size:16px;font-weight:700;color:var(--text);line-height:1.1}
.logo-sub{font-size:10px;font-weight:600;color:var(--warning);display:block}
.header-actions{display:flex;align-items:center;gap:5px}

.icon-btn{width:32px;height:32px;border-radius:var(--r-sm);border:none;background:transparent;
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  color:var(--text-muted);transition:color .15s,background .15s;position:relative}
.icon-btn:hover{color:var(--text);background:var(--bg-muted)}
.icon-btn svg{width:16px;height:16px}
.icon-btn.danger:hover{color:var(--danger);background:var(--danger-glow)}
.upload-btn{width:32px;height:32px;border-radius:var(--r-sm);border:none;cursor:pointer;
  background:var(--accent);color:var(--bg);display:flex;align-items:center;justify-content:center;
  transition:opacity .15s,transform .1s;box-shadow:0 2px 8px rgba(34,211,238,.2)}
.upload-btn:hover{opacity:.85}
.upload-btn:active{transform:scale(.9)}
.upload-btn svg{width:16px;height:16px}

.search-wrap{position:relative;padding:0 14px 10px}
.search-icon{position:absolute;right:26px;top:50%;transform:translateY(-50%);
  width:15px;height:15px;color:var(--text-muted);pointer-events:none}
#search-input{width:100%;height:40px;padding:0 36px 0 34px;border-radius:var(--r);
  border:1px solid transparent;background:var(--bg-muted);color:var(--text);font-size:14px;
  font-family:inherit;outline:none;transition:border .2s;direction:rtl}
#search-input:focus{border-color:var(--accent-border);box-shadow:0 0 0 3px var(--accent-glow)}
.search-clear{position:absolute;left:26px;top:50%;transform:translateY(-50%);
  width:20px;height:20px;border-radius:50%;border:none;background:var(--border);
  cursor:pointer;display:none;align-items:center;justify-content:center;color:var(--text-muted)}
.search-clear.visible{display:flex}
.search-clear svg{width:11px;height:11px}

/* =========================================================
   TAB BAR
========================================================= */
#tab-bar{display:flex;border-bottom:1px solid var(--border); overflow-x:auto;}
#tab-bar::-webkit-scrollbar{display:none;}
.tab-btn{flex:1;min-width:65px;display:flex;flex-direction:column;align-items:center;gap:2px;
  padding:8px 2px 7px;border:none;background:none;cursor:pointer;
  font-size:11px;font-weight:500;color:var(--text-muted);position:relative;
  transition:color .15s;font-family:inherit; white-space:nowrap;}
.tab-btn svg{width:16px;height:16px}
.tab-btn.active{color:var(--accent)}
.tab-btn .tab-count{font-size:9px;font-family:'Courier New',monospace;color:var(--text-dim);
  background:var(--bg-muted);padding:1px 5px;border-radius:99px;margin-top:1px}
.tab-btn.active .tab-count{color:var(--accent);background:var(--accent-glow)}
.tab-btn.active::after{content:'';position:absolute;bottom:0;left:8px;right:8px;
  height:2px;border-radius:2px;background:var(--accent)}

/* =========================================================
   STATS BAR (BOTTOM)
========================================================= */
.stats-bar{
  position:fixed; bottom:0; left:50%; transform:translateX(-50%);
  width:100%; max-width:480px; z-index:30;
  display:flex; gap:0; border-top:1px solid var(--border);
  background:color-mix(in srgb,var(--bg-elevated) 95%,transparent);
  backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);
}
.stat-item{flex:1;display:flex;flex-direction:column;align-items:center;
  padding:6px 4px 12px; gap:2px; border-left:1px solid var(--border)}
.stat-item:last-child{border-left:none}
.stat-num{font-size:14px;font-weight:700;color:var(--text);font-family:'Courier New',monospace}
.stat-lbl{font-size:9px;color:var(--text-muted);text-align:center}
.stat-item.accent .stat-num{color:var(--accent)}
.stat-item.success .stat-num{color:var(--success)}
.stat-item.warning .stat-num{color:var(--warning)}
.stat-item.purple .stat-num{color:var(--purple)}

/* =========================================================
   MAIN CONTENT
========================================================= */
#tab-content{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding-bottom:70px}

/* =========================================================
   SECTION HEADERS
========================================================= */
.section-header{position:sticky;top:0;z-index:10;padding:7px 14px;
  background:color-mix(in srgb,var(--bg) 94%,transparent);
  backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);
  border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;
  border-right:4px solid var(--accent)}
.section-header-left{display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.section-header-title{font-size:13px;font-weight:600;color:var(--text)}
.section-badge{font-size:10px;font-family:'Courier New',monospace;
  padding:2px 8px;border-radius:99px;background:var(--bg-muted);color:var(--text-muted)}
.section-badge.all-done{background:var(--success-glow);color:var(--success)}
.daily-route-btn, .transit-route-btn, .complete-day-btn {
  display:inline-flex;align-items:center;gap:4px;font-size:10px;font-weight:600;
  text-decoration:none;padding:3px 8px;border-radius:99px;transition:opacity .2s;white-space:nowrap;border:none;cursor:pointer;font-family:inherit;
}
.daily-route-btn{color:var(--bg);background:var(--accent);}
.transit-route-btn{color:var(--warning);background:var(--warning-glow);border:1px solid color-mix(in srgb,var(--warning) 28%,transparent);}
.complete-day-btn{color:var(--success);background:var(--success-glow);border:1px solid color-mix(in srgb,var(--success) 28%,transparent);}
.progress-bar-wrap{height:2px;background:var(--border);overflow:hidden}
.progress-bar-fill{height:100%;background:var(--accent);transition:width .5s ease}
.progress-bar-fill.done{background:var(--success)}
.cards-list{padding:10px 12px;display:flex;flex-direction:column;gap:8px}

/* =========================================================
   CARDS
========================================================= */
.card{border-radius:var(--r);border:1px solid var(--border);background:var(--bg-card);overflow:hidden;transition:border-color .2s}
.card.done{opacity:.5;filter:saturate(.4)}
.card.done .card-title{text-decoration:line-through;color:var(--text-muted)}
.card.done .card-check{border-color:var(--success)!important;background:var(--success-glow)!important;color:var(--success)!important}

.card-booking-bar{display:flex;align-items:center;justify-content:space-between;padding:6px 12px; border-bottom:1px solid;}
.card-booking-bar.unbooked {background:var(--danger-glow); border-color:rgba(248,113,113,.18);}
.card-booking-bar.booked {background:var(--success-glow); border-color:rgba(74,222,128,.18);}
.booking-info{display:flex;align-items:center;gap:6px;}
.booking-info svg{width:12px;height:12px;flex-shrink:0}
.unbooked .booking-info{color:var(--danger);}
.booked .booking-info{color:var(--success);}
.booking-info span{font-size:11px;font-weight:600;}
.book-toggle-btn{background:var(--bg-elevated); border:1px solid var(--border); border-radius:4px; padding:2px 8px; font-size:10px; font-weight:600; color:var(--text); cursor:pointer;}
.unbooked .book-toggle-btn{border-color:var(--danger); color:var(--danger);}
.booked .book-toggle-btn{border-color:var(--success); color:var(--success);}

.card-body{display:flex;align-items:flex-start;gap:10px;padding:12px 12px 11px;cursor:pointer;user-select:none}
.card-check{flex-shrink:0;margin-top:1px;width:24px;height:24px;border-radius:50%;
  border:2px solid var(--border);background:var(--bg-muted);cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:border-color .15s,background .15s,color .15s;color:transparent}
.card-check svg{width:13px;height:13px}
.card-main{flex:1;min-width:0}
.card-title-row{display:flex;align-items:flex-start;justify-content:space-between;gap:8px}
.card-title-inner{display:flex;align-items:center;gap:7px;flex:1;min-width:0}
.card-icon{font-size:16px;flex-shrink:0;line-height:1}
.card-title{font-size:14px;font-weight:600;color:var(--text);line-height:1.35;word-break:break-word}
.chevron{width:15px;height:15px;flex-shrink:0;color:var(--text-dim);margin-top:2px;transition:transform .22s}
.card.expanded .chevron{transform:rotate(180deg)}
.card-badges{display:flex;flex-wrap:wrap;gap:5px;margin-top:6px}
.badge{display:inline-flex;align-items:center;gap:4px;padding:2px 8px;border-radius:99px;
  font-size:11px;font-weight:500;line-height:1.4}
.badge svg{width:11px;height:11px;flex-shrink:0}
.badge-time{background:var(--accent-glow);color:var(--accent);border:1px solid var(--accent-border);font-family:'Courier New',monospace}
.badge-area{background:var(--bg-muted);color:var(--text-muted)}
.badge-cost{background:var(--success-glow);color:var(--success);border:1px solid color-mix(in srgb,var(--success) 28%,transparent)}
.badge-dur{background:var(--purple-glow);color:var(--purple);border:1px solid color-mix(in srgb,var(--purple) 28%,transparent);font-family:'Courier New',monospace}
.badge-trans{background:var(--warning-glow);color:var(--warning);border:1px solid color-mix(in srgb,var(--warning) 28%,transparent)}
.badge-cat{background:var(--purple-glow);color:var(--purple);border:1px solid color-mix(in srgb,var(--purple) 28%,transparent)}

.card-details{display:none;padding:0 12px 12px;gap:10px;flex-direction:column}
.card.expanded .card-details{display:flex}
.details-divider{height:1px;background:var(--border);border-radius:1px;margin-bottom:2px}
.card-desc{font-size:13px;color:var(--text-muted);line-height:1.7;white-space:pre-wrap}
.detail-row{display:flex;align-items:flex-start;gap:8px;font-size:12px;color:var(--text-muted);line-height:1.55}
.detail-row svg{width:13px;height:13px;flex-shrink:0;margin-top:1px}
.detail-row .dr-label{font-size:10px;font-weight:600;color:var(--text-dim);text-transform:uppercase;margin-top:1px;flex-shrink:0}
.detail-row .dr-value{flex:1}
.nav-btns{display:flex;flex-direction:column;gap:6px}
.link-btn{display:flex;align-items:center;gap:8px;width:100%;padding:9px 12px;
  border-radius:var(--r-sm);border:1px solid var(--border);background:var(--bg-muted);
  color:var(--text-muted);font-size:12px;font-weight:500;text-decoration:none;
  transition:background .15s;cursor:pointer;font-family:inherit}
.link-btn:hover{background:color-mix(in srgb,var(--text-muted) 12%,transparent);color:var(--text)}
.link-btn.primary{background:var(--accent-glow);color:var(--accent);border-color:var(--accent-border);font-weight:600}
.link-btn.warning{background:var(--warning-glow);color:var(--warning);border-color:color-mix(in srgb,var(--warning) 28%,transparent);font-weight:600}
.link-btn svg{width:14px;height:14px;flex-shrink:0}

/* =========================================================
   DICTIONARY CARD
========================================================= */
.dict-card{display:flex;flex-direction:column;gap:4px;padding:12px;background:var(--bg-card);border:1px solid var(--border);border-radius:var(--r);}
.dict-row{display:flex;justify-content:space-between;align-items:baseline;}
.dict-heb{font-size:15px;font-weight:700;color:var(--accent);}
.dict-for{font-size:14px;font-weight:600;color:var(--text);}
.dict-rom{font-size:12px;color:var(--warning);font-family:'Courier New',monospace;}
.dict-note{font-size:11px;color:var(--text-muted);margin-top:4px;border-top:1px dashed var(--border);padding-top:4px;}

/* =========================================================
   MODALS
========================================================= */
.modal-overlay{position:fixed;inset:0;z-index:1000;background:rgba(0,0,0,.6);
  backdrop-filter:blur(4px);display:flex;align-items:flex-end;justify-content:center;padding:0;
  transition:opacity 0.2s;}
@media(min-height:600px){.modal-overlay{align-items:center;padding:24px 16px}}
.modal-overlay.hidden{opacity:0;pointer-events:none;}
.modal-box{width:100%;max-width:448px;background:var(--bg-card);border:1px solid var(--border);
  border-radius:var(--r-xl) var(--r-xl) 0 0;padding:20px 20px 32px;
  max-height:92dvh;overflow-y:auto;transition:transform 0.2s ease;}
.modal-overlay.hidden .modal-box{transform:translateY(100%);}
@media(min-height:600px){
  .modal-box{border-radius:var(--r-xl);}
  .modal-overlay.hidden .modal-box{transform:translateY(24px) scale(0.95);}
}
.modal-drag-handle{width:36px;height:4px;border-radius:2px;background:var(--border);margin:-4px auto 14px}
@media(min-height:600px){.modal-drag-handle{display:none}}
.modal-title{font-size:15px;font-weight:700;color:var(--text);margin-bottom:14px;display:flex;align-items:center;gap:8px}
.modal-title svg{width:17px;height:17px;color:var(--accent)}
.modal-subtitle{font-size:13px;color:var(--text-muted);line-height:1.6;margin-bottom:14px}
.btn-row{display:flex;gap:8px;margin-top:16px}
.btn-row button{flex:1;padding:10px;border-radius:var(--r-sm);font-size:13px;font-weight:600;
  font-family:inherit;cursor:pointer;transition:opacity .15s;border:none}
.btn-row button:hover{opacity:.85}
.btn-primary{background:var(--accent);color:var(--bg)}
.btn-cancel{background:var(--bg-muted);color:var(--text-muted);border:1px solid var(--border)!important}
.btn-danger{background:var(--danger-glow);color:var(--danger);border:1px solid color-mix(in srgb,var(--danger) 28%,transparent)!important}
.btn-success{background:var(--success);color:var(--bg)}

.edit-group{margin-bottom:11px}
.edit-label{font-size:11px;color:var(--text-muted);margin-bottom:5px;display:block;
  font-weight:600;text-transform:uppercase;letter-spacing:.03em}
.edit-input{width:100%;padding:9px 11px;border-radius:var(--r-sm);border:1px solid var(--border);
  background:var(--bg-muted);color:var(--text);font-family:inherit;font-size:13px;outline:none;transition:border .2s}
.edit-input:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-glow)}
textarea.edit-input{resize:vertical;min-height:72px}
select.edit-input{appearance:none}
.edit-row{display:flex;gap:10px}
.edit-row .edit-group{flex:1;margin-bottom:0}

/* =========================================================
   STACKABLE TOASTS
========================================================= */
#toast-container{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);
  display:flex;flex-direction:column;gap:8px;z-index:9999;width:90%;max-width:320px;pointer-events:none;}
.toast-msg{background:var(--bg-elevated);color:var(--text);padding:10px 14px;
  border-radius:var(--r);border:1px solid var(--border);display:flex;align-items:center;gap:14px;
  font-size:13px;font-weight:600;box-shadow:0 8px 24px rgba(0,0,0,.45);pointer-events:auto;
  animation:fadeUp .3s ease forwards;}
.toast-msg.success{border-color:color-mix(in srgb,var(--success) 30%,transparent);color:var(--success)}
.toast-msg.error{border-color:color-mix(in srgb,var(--danger) 30%,transparent);color:var(--danger)}
.toast-msg .undo-btn{background:var(--accent-glow);color:var(--accent);border:1px solid var(--accent-border);
  border-radius:6px;padding:5px 12px;font-size:12px;font-weight:700;cursor:pointer;margin-right:auto;}

/* =========================================================
   EMPTY STATE & FAB
========================================================= */
.empty-state{display:flex;flex-direction:column;align-items:center;padding:48px 24px 32px;gap:16px;text-align:center}
.empty-icon{width:56px;height:56px;border-radius:var(--r-lg);background:var(--warning-glow);border:1px solid color-mix(in srgb,var(--warning) 22%,transparent);display:flex;align-items:center;justify-content:center}
.empty-icon svg{width:24px;height:24px;color:var(--warning)}
.empty-title{font-size:15px;font-weight:700;color:var(--text)}
.empty-sub{font-size:13px;color:var(--text-muted);line-height:1.5;max-width:260px}
.empty-actions{display:flex;gap:10px;margin-top:4px;flex-wrap:wrap;justify-content:center}
.empty-btn{display:flex;align-items:center;gap:6px;padding:9px 16px;border-radius:var(--r-sm);font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;border:none;}
.empty-btn.primary{background:var(--accent);color:var(--bg)}
.empty-btn.secondary{background:var(--bg-muted);color:var(--text-muted);border:1px solid var(--border)}
.add-fab{display:flex;align-items:center;gap:6px;margin:10px 12px 0;padding:9px 14px;border-radius:var(--r-sm);border:1px dashed var(--border);background:transparent;color:var(--text-muted);font-size:12px;font-weight:500;cursor:pointer;width:calc(100% - 24px)}
.add-fab:hover{border-color:var(--accent);color:var(--accent)}

/* =========================================================
   LOADING & ANIMATIONS
========================================================= */
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.fade-up{animation:fadeUp .25s ease both}
.loading-overlay{position:fixed;inset:0;z-index:9999;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px}
.loading-spinner{width:52px;height:52px;border-radius:var(--r-lg);background:var(--accent-glow);border:1px solid var(--accent-border);display:flex;align-items:center;justify-content:center;animation:spin .8s linear infinite}
.loading-spinner svg{width:22px;height:22px;color:var(--accent)}
</style>
</head>
<body>

<div id="app">
  <header id="app-header">
    <div class="header-top">
      <div class="logo">
        <div class="logo-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 0 1 16 0Z"/><circle cx="12" cy="10" r="3"/>
          </svg>
        </div>
        <div>
          <div class="logo-title">TripMH</div>
          <span class="logo-sub" id="logo-sub">לחץ + להתחיל</span>
        </div>
      </div>
      <div class="header-actions">
        <button class="icon-btn" id="btn-theme" aria-label="שנה ערכת צבעים">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"/>
          </svg>

<script>
'use strict';
/* =========================================================
   CONSTANTS & ICONS
========================================================= */
const LS_DATA      = 'tripmh_data_v10';
const LS_COMPLETED = 'tripmh_completed_v10';
const LS_BOOKED    = 'tripmh_booked_v10';
const LS_EXPANDED  = 'tripmh_expanded_v10';
const LS_TAB       = 'tripmh_tab_v10';
const LS_DARK      = 'tripmh_dark_v10';

const DAY_COLORS = ['#22d3ee','#4ade80','#c084fc','#fbbf24','#f87171','#60a5fa','#f472b6','#34d399','#fb923c','#a78bfa'];

function svgIcon(name) {
  const i = {
    pin: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 0 1 16 0Z"/><circle cx="12" cy="10" r="3"/></svg>`,
    clock: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>`,
    dur: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 8v4l2 2"/></svg>`,
    bus: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="5" width="20" height="15" rx="2"/><path d="M2 10h20"/><circle cx="7" cy="20" r="1"/><circle cx="17" cy="20" r="1"/></svg>`,
    book: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>`,
    nav: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="3 11 22 2 13 21 11 13 3 11"/></svg>`,
    link: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg>`,
    warn: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m21.73 18-8-14a2 2 0 0 0-3.48 0l-8 14A2 2 0 0 0 4 21h16a2 2 0 0 0 1.73-3Z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>`,
    edit: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>`,
    chev: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg>`,
    check: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M20 6 9 17l-5-5"/></svg>`,
    money: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M9.5 9a3 3 0 0 1 5 1c0 2-3 3-3 3"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>`,
    checkAll: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M2 12l5 5L20 5"/><path d="M7 12l5 5 8-8" opacity=".4"/></svg>`,
    tag: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20.59 13.41l-7.17 7.17a2 2 0 0 1-2.83 0L2 12V2h10l8.59 8.59a2 2 0 0 1 0 2.82z"/><line x1="7" y1="7" x2="7.01" y2="7"/></svg>`,
    ok: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>`
  };
  return i[name] || '';
}

/* =========================================================
   STATE
========================================================= */
let state = {
  data: { itinerary: [], options: [], checklist: [], tips: [], dictionary: [] },
  completedIds: new Set(),
  bookedIds: new Set(),
  expandedIds: new Set(),
  activeTab: 'itinerary',
  isDark: true,
  searchQuery: '',
  editItem: null
};

/* =========================================================
   LOCAL STORAGE
========================================================= */
function lsGet(key, fb) { try { const v = localStorage.getItem(key); return v ? JSON.parse(v) : fb; } catch { return fb; } }
function lsSet(key, v) { try { localStorage.setItem(key, JSON.stringify(v)); } catch {} }
function persistState() {
  lsSet(LS_DATA, state.data);
  lsSet(LS_COMPLETED, [...state.completedIds]);
  lsSet(LS_BOOKED, [...state.bookedIds]);
  lsSet(LS_EXPANDED, [...state.expandedIds]);
  lsSet(LS_TAB, state.activeTab);
  localStorage.setItem(LS_DARK, String(state.isDark));
}

/* =========================================================
   TOAST SYSTEM (Stacking Undo)
========================================================= */
function addToast(msg, type = 'neutral', undoCallback = null) {
  const container = document.getElementById('toast-container');
  const toast = document.createElement('div');
  toast.className = `toast-msg ${type}`;
  toast.innerHTML = `<span>${msg}</span>${undoCallback ? `<button class="undo-btn">בטל פעולה</button>` : ''}`;
  
  if (undoCallback) {
    toast.querySelector('.undo-btn').addEventListener('click', () => {
      undoCallback();
      toast.remove();
    });
  }
  
  container.prepend(toast);
  setTimeout(() => {
    if (toast.parentNode) {
      toast.style.opacity = '0';
      setTimeout(() => toast.remove(), 300);
    }
  }, 6000);
}

/* =========================================================
   MODALS (Confirm)
========================================================= */
function showConfirm(title, text, onConfirm, isDanger=false) {
  const m = document.getElementById('modal-confirm');
  document.getElementById('mc-title').textContent = title;
  document.getElementById('mc-text').textContent = text;
  const btnC = document.getElementById('mc-btn-confirm');
  
  btnC.className = isDanger ? 'btn-danger' : 'btn-primary';
  btnC.onclick = () => { onConfirm(); m.classList.add('hidden'); };
  document.getElementById('mc-btn-cancel').onclick = () => m.classList.add('hidden');
  m.classList.remove('hidden');
}

/* =========================================================
   CSV PARSING & DEDUPLICATION
========================================================= */
const ALIASES = {
  place: ['שם המקום','אטרקציה','יעד','מקום','כותרת','title','name'],
  day: ['יום','day'], date: ['תאריך','date'],
  time: ['שעות','זמן פתיחה','מתי','time','שעת פתיחה'],
  dur: ['משך','זמן מוערך','duration','זמן ביקור'],
  cost: ['עלות','מחיר','כסף','cost','price'],
  trans: ['תחבורה','הגעה','איך','transport'],
  book: ['הזמנה','שריון','כרטיסים','booking'],
  desc: ['תיאור','הערות','מה לעשות','desc','תוכן','פירוט'],
  area: ['אזור','עיר','מיקום','כתובת','area','location'],
  category: ['קטגוריה','category','נושא'],
  task: ['משימה','ציוד','פריט','task','item'],
  hebrew: ['עברית','hebrew','מילה בעברית','משמעות'],
  foreign: ['יפנית','japanese','שפה זרה','מילה','foreign'],
  romaji: ['הגייה','romaji','קריאה','pronunciation']
};

function getCol(obj, type) {
  for (const alias of (ALIASES[type]||[])) {
    const k = Object.keys(obj).find(x => x.toLowerCase().includes(alias));
    if (k && obj[k]?.trim()) return obj[k].trim();
  }
  return '';
}

function detectType(fname, hdrs) {
  const n = fname.toLowerCase(), h = hdrs.join(' ').toLowerCase();
  if (/מילון|שפה|מילים|dictionary|words/.test(n) || /עברית|יפנית|hebrew|romaji/.test(h)) return 'dictionary';
  if (/צ'ק|משימות|ציוד|checklist|tasks/.test(n) || /משימה|task/.test(h)) return 'checklist';
  if (/טיפ|tips?|hint|עצה/.test(n) || /\bטיפ|\btip|עצה/.test(h)) return 'tips';
  if (/השלמ|אופצי|option/.test(n) || /אופצי/.test(h)) return 'options';
  return 'itinerary';
}

function parseTimeVal(str) {
  if (!str) return 9999;
  const m = str.match(/(\d{1,2}):(\d{2})/);
  if (m) return parseInt(m[1])*60 + parseInt(m[2]);
  return 9999;
}
function parseDateVal(d) {
  if (!d) return 0;
  let m = d.match(/(\d{1,2})[\/\-\.](\d{1,2})[\/\-\.](\d{4})/);
  if (m) return new Date(`${m[3]}-${m[2].padStart(2,'0')}-${m[1].padStart(2,'0')}`).getTime();
  return 0;
}
function formatTime(s) { return (s||'').replace(/[\u2013\u2014\-]/g,' – ').replace(/\s{2,}/g,' ').trim(); }
function formatCost(s) { return (!s || /חינם|free|0/i.test(s)) ? 'חינם' : s; }
function extractBookingAdv(txt) {
  const m = (txt||'').match(/(\d+)\s*(ימים?|days?|שבוע|שבועות|שעות?)/i);
  if (!m) return '';
  const n = parseInt(m[1]), u = m[2].toLowerCase();
  if (/שעות?/.test(u)) return `${n} שעות מראש`;
  if (/שבוע/.test(u)) return `${n*7} ימים מראש`;
  return `${n} ימים מראש`;
}
function genId() { return 'i' + Math.random().toString(36).slice(2,9); }

function mergeItem(arr, newItem, matchFn) {
  const idx = arr.findIndex(matchFn);
  if (idx >= 0) arr[idx] = { ...arr[idx], ...newItem, id: arr[idx].id };
  else arr.push(newItem);
}

async function processFiles(files) {
  let additions = { itinerary:0, options:0, checklist:0, tips:0, dictionary:0 };

  for (const f of Array.from(files)) {
    const text = await f.text();
    if (f.name.endsWith('.json')) {
      try {
        const p = JSON.parse(text);
        if (p.data) {
          state.data = p.data;
          state.completedIds = new Set(p.completedIds||[]);
          state.bookedIds = new Set(p.bookedIds||[]);
          addToast('נתוני גיבוי שוחזרו בהצלחה', 'success');
          return true;
        }
      } catch (e) { addToast('שגיאה בייבוא JSON', 'error'); }
      continue;
    }

    const rows = text.replace(/^\uFEFF/,'').replace(/\r/g,'').split('\n').filter(l=>l.trim());
    if (rows.length < 2) continue;
    const delim = (rows[0].match(/,/g)||[]).length > (rows[0].match(/\t/g)||[]).length ? ',' : '\t';
    const hdrs = rows[0].split(delim).map(s=>s.trim().toLowerCase());
    const type = detectType(f.name, hdrs);

    for (let i=1; i<rows.length; i++) {
      const cols = rows[i].split(delim);
      const obj = {}; hdrs.forEach((h,j) => obj[h]=cols[j]?.trim()||'');
      
      if (type === 'dictionary') {
        const heb = getCol(obj,'hebrew'), forW = getCol(obj,'foreign');
        if (heb || forW) {
          mergeItem(state.data.dictionary, {
            id:genId(), type:'dictionary', hebrew:heb, foreign:forW, 
            romaji:getCol(obj,'romaji'), context:getCol(obj,'context')||getCol(obj,'category')
          }, x => x.hebrew === heb);
          additions.dictionary++;
        }
      } 
      else if (type === 'checklist') {
        const task = getCol(obj,'task');
        if (task) {
          mergeItem(state.data.checklist, {
            id:genId(), type:'task', title:task, category:getCol(obj,'category')||'כללי',
            description:getCol(obj,'desc')
          }, x => x.title === task);
          additions.checklist++;
        }
      }
      else if (type === 'tips') {
        const title = getCol(obj,'place') || getCol(obj,'category') || `טיפ ${i}`;
        const content = getCol(obj,'desc') || Object.values(obj).filter(Boolean).join(' - ');
        if (content) {
          mergeItem(state.data.tips, {
            id:genId(), type:'tip', title, content, category:getCol(obj,'category')||'כללי'
          }, x => x.title === title);
          additions.tips++;
        }
      }
      else {
        const place = getCol(obj,'place');
        if (!place) continue;
        const dayLabel = getCol(obj,'day') || 'כללי';
        const dateStr = getCol(obj,'date');
        const booking = getCol(obj,'book');
        const mapQ = encodeURIComponent(place + ' ' + getCol(obj,'area'));
        const isOpt = type === 'options' || /אופצי/.test(dayLabel);
        
        const item = {
          id:genId(), type: isOpt?'option':'itinerary',
          placeName: place, dayLabel, dateStr,
          dateVal: parseDateVal(dateStr||dayLabel), timeVal: parseTimeVal(getCol(obj,'time')),
          timeRange: formatTime(getCol(obj,'time')),
          description: getCol(obj,'desc'), cost: formatCost(getCol(obj,'cost')),
          transport: getCol(obj,'trans'), area: getCol(obj,'area'),
          booking: booking, requiresBooking: booking.length > 2 && !/אין צורך|במקום|walk|free/i.test(booking),
          link: obj.link||'', mapUrl: `https://www.google.com/maps/search/?api=1&query=${mapQ}`,
          transitUrl: `https://www.google.com/maps/dir/?api=1&destination=${mapQ}&travelmode=transit`,
          icon: '📍'
        };
        
        const dest = isOpt ? state.data.options : state.data.itinerary;
        mergeItem(dest, item, x => x.placeName === place && x.dayLabel === dayLabel);
        if (isOpt) additions.options++; else additions.itinerary++;
      }
    }
  }

  // Sort
  const sortFn = (a,b) => (a.dateVal - b.dateVal) || (a.timeVal - b.timeVal) || 0;
  state.data.itinerary.sort(sortFn);
  state.data.options.sort(sortFn);
  return additions;
}

/* =========================================================
   UI ACTIONS
========================================================= */
function toggleCheck(id) {
  const st = state.completedIds.has(id);
  if(st) state.completedIds.delete(id); else state.completedIds.add(id);
  
  addToast(st ? 'סימון בוטל' : 'סומן כבוצע', 'neutral', () => {
    if(st) state.completedIds.add(id); else state.completedIds.delete(id);
    updateUI(); persistState();
  });
  updateUI(); persistState();
}

function toggleBooked(id) {
  const isBooked = state.bookedIds.has(id);
  if (isBooked) {
    state.bookedIds.delete(id);
    updateUI(); persistState();
    addToast('סימון הזמנה בוטל', 'neutral', () => {
      state.bookedIds.add(id); updateUI(); persistState();
    });
  } else {
    showConfirm('אישור הזמנה', 'האם אתה בטוח שהזמנת/שילמת על פריט זה?', () => {
      state.bookedIds.add(id);
      updateUI(); persistState();
      addToast('סומן כהוזמן בהצלחה', 'success', () => {
        state.bookedIds.delete(id); updateUI(); persistState();
      });
    });
  }
}

function toggleExpand(id) {
  if (state.expandedIds.has(id)) state.expandedIds.delete(id); else state.expandedIds.add(id);
  updateUI(); persistState();
}

/* =========================================================
   RENDERING
========================================================= */
function esc(s) { return (s||'').replace(/&/g,'&').replace(/</g,'<').replace(/>/g,'>'); }
function hl(s, q) {
  if (!q) return esc(s);
  return esc(s).replace(new RegExp('('+q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')+')','gi'),'<mark>$1</mark>');
}

function renderTripCard(item, q) {
  const done = state.completedIds.has(item.id);
  const exp = state.expandedIds.has(item.id);
  
  let bookBar = '';
  if (item.requiresBooking) {
    const isBooked = state.bookedIds.has(item.id);
    const adv = extractBookingAdv(item.booking);
    const label = isBooked ? 'הוזמן / שולם' : `דורש הזמנה מראש${adv ? ' ('+adv+')' : ''}`;
    bookBar = `
    <div class="card-booking-bar ${isBooked ? 'booked' : 'unbooked'}" onclick="event.stopPropagation()">
      <div class="booking-info">${svgIcon(isBooked ? 'ok' : 'warn')} <span>${label}</span></div>
      <button class="book-toggle-btn" onclick="toggleBooked('${item.id}')">${isBooked ? 'בטל' : 'סמן כטופל'}</button>
    </div>`;
  }

  const badges = [
    item.timeRange ? `<span class="badge badge-time">${svgIcon('clock')}${hl(item.timeRange,q)}</span>` : '',
    item.cost && item.cost!=='חינם' ? `<span class="badge badge-cost">${svgIcon('money')}${hl(item.cost,q)}</span>` : ''
  ].filter(Boolean).join('');

  return `
  <article class="card ${done?'done':''} ${exp?'expanded':''} fade-up" data-id="${item.id}">
    ${bookBar}
    <div class="card-body" onclick="toggleExpand('${item.id}')">
      <button class="card-check" onclick="event.stopPropagation();toggleCheck('${item.id}')">
        ${done ? svgIcon('check') : ''}
      </button>
      <div class="card-main">
        <div class="card-title-row">
          <div class="card-title-inner">
            <span class="card-icon">${item.icon}</span>
            <h3 class="card-title">${hl(item.placeName,q)}</h3>
          </div>
          <span class="chevron">${svgIcon('chev')}</span>
        </div>
        <div class="card-badges">${badges}</div>
      </div>
    </div>
    <div class="card-details">
      <div class="details-divider"></div>
      ${item.description ? `<p class="card-desc">${hl(item.description,q)}</p>` : ''}
      ${item.transport ? `<div class="detail-row">${svgIcon('bus')}<span class="dr-label">הגעה:</span><span class="dr-value">${hl(item.transport,q)}</span></div>` : ''}
      <div class="nav-btns" style="margin-top:8px">
        ${item.mapUrl ? `<a href="${item.mapUrl}" target="_blank" class="link-btn primary">🗺️ ניווט במפה (Google)</a>` : ''}
        ${item.transitUrl ? `<a href="${item.transitUrl}" target="_blank" class="link-btn warning">🚌 תחבורה למקום</a>` : ''}
        ${item.link ? `<a href="${item.link}" target="_blank" class="link-btn">🌐 אתר רשמי / כרטיסים</a>` : ''}
        <button class="link-btn" onclick="openEdit('${item.id}')" style="justify-content:center;border-style:dashed">${svgIcon('edit')} ערוך נתונים</button>
      </div>
    </div>
  </article>`;
}

function renderDictCard(item, q) {
  return `
  <article class="dict-card fade-up">
    <div class="dict-row">
      <span class="dict-heb">${hl(item.hebrew,q)}</span>
      <button class="icon-btn" onclick="openEdit('${item.id}')" style="width:24px;height:24px">${svgIcon('edit')}</button>
    </div>
    <div class="dict-row" style="margin-top:2px;">
      <span class="dict-for">${hl(item.foreign,q)}</span>
      <span class="dict-rom">${hl(item.romaji,q)}</span>
    </div>
    ${item.context ? `<div class="dict-note">${hl(item.context,q)}</div>` : ''}
  </article>`;
}

function renderChecklistCard(item, q) {
  const done = state.completedIds.has(item.id);
  return `
  <article class="card ${done?'done':''} fade-up" style="padding:10px; display:flex; align-items:center; gap:10px;">
    <button class="card-check" onclick="toggleCheck('${item.id}')" style="flex-shrink:0;">
      ${done ? svgIcon('check') : ''}
    </button>
    <div style="flex:1; cursor:pointer;" onclick="openEdit('${item.id}')">
      <div style="font-size:14px; font-weight:600; color:var(--text); text-decoration:${done?'line-through':'none'}">${hl(item.title,q)}</div>
      ${item.description ? `<div style="font-size:11px; color:var(--text-muted);">${hl(item.description,q)}</div>` : ''}
    </div>
  </article>`;
}

function renderPanel(type, items, q) {
  if (!items.length) return `<div class="empty-state"><div class="empty-title">אין נתונים בלשונית זו</div></div>`;
  
  const groups = new Map();
  items.forEach(i => {
    let k = i.category || 'כללי';
    if (i.type === 'itinerary' || i.type === 'option') {
      k = i.dayLabel;
      if (i.dateStr) k += ` (${i.dateStr})`;
    }
    if (!groups.has(k)) groups.set(k,[]);
    groups.get(k).push(i);
  });

  let html = '';
  let colorIdx = 0;
  
  groups.forEach((arr, key) => {
    const c = DAY_COLORS[colorIdx++ % DAY_COLORS.length];
    
    html += `<div class="section-header" style="border-right-color:${c}">
      <span class="section-header-title">${hl(key,q)}</span>
      <span class="section-badge">${arr.length} פריטים</span>
    </div><div class="cards-list">`;
    
    arr.forEach(item => {
      if(item.type === 'dictionary') html += renderDictCard(item, q);
      else if (item.type === 'task') html += renderChecklistCard(item, q);
      else if (item.type === 'tip') html += renderTripCard({...item, placeName:item.title, description:item.content, icon:'💡'}, q);
      else html += renderTripCard(item, q);
    });
    html += `</div>`;
  });
  
  return html + `<button class="add-fab" onclick="openAdd('${type}')">+ הוסף פריט חדש</button>`;
}

function updateUI() {
  const d = state.data;
  const q = state.searchQuery.toLowerCase();
  
  const flt = (arr) => arr.filter(i => !q || Object.values(i).some(v => String(v).toLowerCase().includes(q)));
  
  const fi = flt(d.itinerary), fo = flt(d.options), fc = flt(d.checklist), ft = flt(d.tips), fd = flt(d.dictionary);

  document.getElementById('panel-itinerary').innerHTML = renderPanel('itinerary', fi, q);
  document.getElementById('panel-options').innerHTML = renderPanel('option', fo, q);
  document.getElementById('panel-checklist').innerHTML = renderPanel('task', fc, q);
  document.getElementById('panel-tips').innerHTML = renderPanel('tip', ft, q);
  document.getElementById('panel-dictionary').innerHTML = renderPanel('dictionary', fd, q);

  document.getElementById('count-itinerary').textContent = d.itinerary.length;
  document.getElementById('count-options').textContent = d.options.length;
  document.getElementById('count-checklist').textContent = d.checklist.length;
  document.getElementById('count-tips').textContent = d.tips.length;
  document.getElementById('count-dictionary').textContent = d.dictionary.length;

  const hasData = [d.itinerary, d.options, d.checklist, d.tips, d.dictionary].some(a => a.length>0);
  ['btn-share','btn-export','btn-clear'].forEach(id => document.getElementById(id).style.display = hasData ? 'flex' : 'none');
  
  // Bottom stats
  if (hasData) {
    document.getElementById('stats-bar').style.display = 'flex';
    document.getElementById('stat-attractions').textContent = d.itinerary.length + d.options.length;
    document.getElementById('stat-done').textContent = state.completedIds.size;
    const req = [...d.itinerary, ...d.options].filter(i => i.requiresBooking).length;
    const booked = state.bookedIds.size;
    document.getElementById('stat-booking').textContent = `${booked}/${req}`;
  } else {
    document.getElementById('stats-bar').style.display = 'none';
  }
}

/* =========================================================
   EDIT / ADD FORMS
========================================================= */
function buildForm(item) {
  if (item.type === 'dictionary') return `
    <div class="edit-group"><label class="edit-label">עברית</label><input class="edit-input" id="ef-hebrew" value="${esc(item.hebrew)}"></div>
    <div class="edit-group"><label class="edit-label">שפה זרה</label><input class="edit-input" id="ef-foreign" value="${esc(item.foreign)}"></div>
    <div class="edit-group"><label class="edit-label">הגייה</label><input class="edit-input" id="ef-romaji" value="${esc(item.romaji)}"></div>
    <div class="edit-group"><label class="edit-label">הקשר / קטגוריה</label><input class="edit-input" id="ef-context" value="${esc(item.context)}"></div>`;
  if (item.type === 'task') return `
    <div class="edit-group"><label class="edit-label">שם המשימה</label><input class="edit-input" id="ef-title" value="${esc(item.title)}"></div>
    <div class="edit-group"><label class="edit-label">קטגוריה</label><input class="edit-input" id="ef-category" value="${esc(item.category)}"></div>
    <div class="edit-group"><label class="edit-label">הערות</label><input class="edit-input" id="ef-desc" value="${esc(item.description)}"></div>`;
  // Trip / Tip
  return `
    <div class="edit-group"><label class="edit-label">שם / כותרת</label><input class="edit-input" id="ef-place" value="${esc(item.placeName||item.title)}"></div>
    <div class="edit-row">
      <div class="edit-group"><label class="edit-label">יום / קטגוריה</label><input class="edit-input" id="ef-day" value="${esc(item.dayLabel||item.category)}"></div>
      <div class="edit-group"><label class="edit-label">תאריך</label><input class="edit-input" id="ef-date" value="${esc(item.dateStr||'')}"></div>
    </div>
    <div class="edit-group"><label class="edit-label">תיאור / תוכן</label><textarea class="edit-input" id="ef-desc" rows="3">${esc(item.description||item.content)}</textarea></div>
    <div class="edit-group"><label class="edit-label">הזמנה מראש (ימים / קישור)</label><input class="edit-input" id="ef-book" value="${esc(item.booking||'')}"></div>
    <div class="edit-group"><label class="edit-label">תחבורה</label><input class="edit-input" id="ef-trans" value="${esc(item.transport||'')}"></div>
    <div class="edit-group"><label class="edit-label">כתובת / ניווט</label><input class="edit-input" id="ef-area" value="${esc(item.area||'')}"></div>`;
}

function readForm(item) {
  const g = id => document.getElementById(id)?.value||'';
  if (item.type === 'dictionary') return { ...item, hebrew:g('ef-hebrew'), foreign:g('ef-foreign'), romaji:g('ef-romaji'), context:g('ef-context') };
  if (item.type === 'task') return { ...item, title:g('ef-title'), category:g('ef-category'), description:g('ef-desc') };
  
  const mapQ = encodeURIComponent(g('ef-place') + ' ' + g('ef-area'));
  return { ...item, 
    placeName:g('ef-place'), title:g('ef-place'), dayLabel:g('ef-day'), category:g('ef-day'), 
    dateStr:g('ef-date'), dateVal:parseDateVal(g('ef-date')||g('ef-day')),
    description:g('ef-desc'), content:g('ef-desc'), booking:g('ef-book'), 
    requiresBooking: g('ef-book').length > 2 && !/אין צורך|walk/i.test(g('ef-book')),
    transport:g('ef-trans'), area:g('ef-area'),
    mapUrl: `https://www.google.com/maps/search/?api=1&query=${mapQ}`,
    transitUrl: `https://www.google.com/maps/dir/?api=1&destination=${mapQ}&travelmode=transit`
  };
}

function openEdit(id) {
  const arr = [...state.data.itinerary, ...state.data.options, ...state.data.checklist, ...state.data.tips, ...state.data.dictionary];
  state.editItem = arr.find(x => x.id === id);
  document.getElementById('edit-modal-title').textContent = 'עריכת פריט';
  document.getElementById('edit-form-body').innerHTML = buildForm(state.editItem);
  document.getElementById('edit-delete').style.display = 'block';
  document.getElementById('modal-edit').classList.remove('hidden');
}

function openAdd(type) {
  state.editItem = { id:genId(), type };
  document.getElementById('edit-modal-title').textContent = 'הוספת פריט חדש';
  document.getElementById('edit-form-body').innerHTML = buildForm(state.editItem);
  document.getElementById('edit-delete').style.display = 'none';
  document.getElementById('modal-edit').classList.remove('hidden');
}

document.getElementById('edit-save').onclick = () => {
  const updated = readForm(state.editItem);
  const k = updated.type === 'dictionary' ? 'dictionary' : updated.type === 'task' ? 'checklist' : updated.type === 'tip' ? 'tips' : updated.type === 'option' ? 'options' : 'itinerary';
  
  const idx = state.data[k].findIndex(x => x.id === updated.id);
  if(idx >= 0) state.data[k][idx] = updated; else state.data[k].push(updated);
  
  document.getElementById('modal-edit').classList.add('hidden');
  updateUI(); persistState(); addToast('הפריט נשמר', 'success');
};

document.getElementById('edit-delete').onclick = () => {
  showConfirm('מחיקת פריט', 'האם למחוק פריט זה?', () => {
    const id = state.editItem.id;
    for(let k in state.data) state.data[k] = state.data[k].filter(x => x.id !== id);
    document.getElementById('modal-edit').classList.add('hidden');
    updateUI(); persistState(); addToast('הפריט נמחק', 'neutral');
  }, true);
};

document.getElementById('edit-cancel').onclick = () => document.getElementById('modal-edit').classList.add('hidden');

/* =========================================================
   EVENTS & BOOT
========================================================= */
document.querySelectorAll('.tab-btn').forEach(b => {
  b.onclick = () => {
    state.activeTab = b.dataset.tab;
    document.querySelectorAll('.tab-btn').forEach(tb => tb.classList.toggle('active', tb===b));
    ['itinerary','options','checklist','tips','dictionary'].forEach(t => 
      document.getElementById('panel-'+t).style.display = t===state.activeTab ? 'block' : 'none'
    );
    persistState();
  };
});

document.getElementById('btn-upload').onclick = () => document.getElementById('modal-upload').classList.remove('hidden');
document.getElementById('modal-upload-close').onclick = () => document.getElementById('modal-upload').classList.add('hidden');
document.getElementById('modal-pick-csv').onclick = () => { document.getElementById('modal-upload').classList.add('hidden'); document.getElementById('file-csv').click(); };
document.getElementById('modal-pick-json').onclick = () => { document.getElementById('modal-upload').classList.add('hidden'); document.getElementById('file-json').click(); };

document.getElementById('file-csv').onchange = async e => {
  document.getElementById('loading-overlay').style.display='flex';
  const res = await processFiles(e.target.files);
  document.getElementById('loading-overlay').style.display='none';
  if(res) { updateUI(); persistState(); addToast('הנתונים סונכרנו', 'success'); }
};
document.getElementById('file-json').onchange = async e => {
  document.getElementById('loading-overlay').style.display='flex';
  await processFiles(e.target.files);
  document.getElementById('loading-overlay').style.display='none';
  updateUI(); persistState();
};

document.getElementById('search-input').oninput = e => { state.searchQuery = e.target.value; updateUI(); };
document.getElementById('search-clear').onclick = () => { document.getElementById('search-input').value=''; state.searchQuery=''; updateUI(); };

document.getElementById('btn-clear').onclick = () => {
  showConfirm('מחיקת כל הנתונים', 'פעולה זו תמחק הכל ללא אפשרות שחזור.', () => {
    state.data = {itinerary:[], options:[], checklist:[], tips:[], dictionary:[]};
    state.completedIds.clear(); state.bookedIds.clear();
    updateUI(); persistState(); addToast('הנתונים נמחקו', 'neutral');
  }, true);
};

document.getElementById('btn-export').onclick = () => document.getElementById('modal-export').classList.remove('hidden');
document.getElementById('modal-export-close').onclick = () => document.getElementById('modal-export').classList.add('hidden');

function download(content, name, type) {
  const a = document.createElement('a'); a.href = URL.createObjectURL(new Blob([content], {type})); 
  a.download = name; a.click();
}

document.getElementById('exp-json').onclick = () => {
  download(JSON.stringify({version:3, data:state.data, completedIds:[...state.completedIds], bookedIds:[...state.bookedIds]}), 'trip_backup.json', 'application/json');
  document.getElementById('modal-export').classList.add('hidden');
};

document.getElementById('btn-theme').onclick = () => {
  state.isDark = !state.isDark;
  document.documentElement.className = state.isDark ? 'dark' : 'light';
  persistState();
};

// Boot
window.onload = () => {
  const d = lsGet(LS_DARK, true);
  state.isDark = d; document.documentElement.className = d ? 'dark' : 'light';
  const pData = lsGet(LS_DATA, null);
  if(pData) {
    state.data = { itinerary:[], options:[], checklist:[], tips:[], dictionary:[], ...pData };
    state.completedIds = new Set(lsGet(LS_COMPLETED,[]));
    state.bookedIds = new Set(lsGet(LS_BOOKED,[]));
    state.expandedIds = new Set(lsGet(LS_EXPANDED,[]));
  }
  state.activeTab = lsGet(LS_TAB, 'itinerary');
  document.querySelector(`.tab-btn[data-tab="${state.activeTab}"]`)?.click();
  updateUI();
};
</script>
</body>
</html>
